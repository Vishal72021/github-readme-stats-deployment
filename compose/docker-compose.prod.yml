version: "3.9"

services:
  github-readme-stats:
    image: ghcr.io/anuraghazra/github-readme-stats:latest
    container_name: github-readme-stats

    restart: unless-stopped

    ports:
      - "8080:9000"

    env_file:
      - ../.env

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - github-stats

networks:
  github-stats:
    driver: bridge