###############################################################################
# GitHub Readme Stats Deployment
#
# Nginx Global Configuration
#
# Responsibilities
#   - Configure the Nginx worker process model
#   - Configure global connection handling
#   - Configure HTTP runtime defaults
#   - Configure container-compatible logging
#   - Configure MIME type handling
#   - Configure baseline HTTP performance settings
#   - Configure baseline security behavior
#   - Load application-specific virtual host configurations
#
# This file intentionally does NOT:
#   - Define application-specific upstreams
#   - Define application-specific proxy routes
#   - Configure TLS certificates
#   - Configure HTTP-to-HTTPS redirects
#
# Application-specific configuration belongs in:
#   /etc/nginx/conf.d/*.conf
###############################################################################

###############################################################################
# Process Configuration
###############################################################################

user nginx;

worker_processes auto;

pid /var/run/nginx.pid;

###############################################################################
# Error Logging
###############################################################################

error_log /dev/stderr warn;

###############################################################################
# Events
###############################################################################

events {

    worker_connections 1024;

}

###############################################################################
# HTTP Configuration
###############################################################################

http {

    ###########################################################################
    # MIME Types
    ###########################################################################

    include /etc/nginx/mime.types;

    default_type application/octet-stream;

    ###########################################################################
    # Logging
    ###########################################################################

    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    ###########################################################################
    # Security
    ###########################################################################

    server_tokens off;

    ###########################################################################
    # Connection Handling
    ###########################################################################

    sendfile on;

    tcp_nopush on;

    keepalive_timeout 65;

    ###########################################################################
    # Request Handling
    ###########################################################################

    client_max_body_size 1m;

    ###########################################################################
    # Compression
    ###########################################################################

    gzip on;

    gzip_vary on;

    gzip_proxied any;

    gzip_comp_level 5;

    gzip_min_length 256;

    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    ###########################################################################
    # Application Configuration
    ###########################################################################

    include /etc/nginx/conf.d/*.conf;

}