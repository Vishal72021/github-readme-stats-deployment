###############################################################################
# GitHub Readme Stats Deployment
#
# Docker Compose Configuration
#
# Responsibilities
#   - Build the application container image
#   - Configure runtime environment variables
#   - Publish the application port
#   - Configure container restart behavior
#   - Orchestrate the application service
#
# Build Context
#   Project repository root
#
# Dockerfile
#   docker/Dockerfile
###############################################################################

services:
  github-readme-stats:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: github-readme-stats

    environment:
      PAT_1: ${PAT_1}
      PORT: ${PORT:-9000}
      CACHE_SECONDS: ${CACHE_SECONDS:-21600}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NODE_ENV: production

    expose:
      - "9000"

    restart: unless-stopped

    networks:
      - app-network

  nginx:
    image: nginx:alpine

    container_name: github-readme-stats-nginx

    depends_on:
      github-readme-stats:
        condition: service_healthy

    ports:
    - "${HTTP_PORT:-80}:80"
    - "${HTTPS_PORT:-443}:443"

    volumes:
    - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ../nginx/conf.d:/etc/nginx/conf.d:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro

    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --no-check-certificate --tries=1 --spider https://127.0.0.1/nginx-health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    restart: unless-stopped

    networks:
      - app-network

networks:
  app-network:
    driver: bridge