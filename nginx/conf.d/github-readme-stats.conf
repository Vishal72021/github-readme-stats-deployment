###############################################################################
# GitHub Readme Stats Deployment
#
# Application Reverse Proxy and TLS Configuration
#
# Responsibilities
#   - Define the GitHub Readme Stats upstream
#   - Accept incoming HTTP and HTTPS requests
#   - Redirect public HTTP traffic to HTTPS
#   - Terminate TLS at the Nginx reverse proxy
#   - Provide an independent Nginx health endpoint
#   - Proxy application traffic to the internal application service
#   - Preserve client and request metadata
#   - Configure proxy connection and response timeouts
#
# This file intentionally does NOT:
#   - Configure global Nginx runtime behavior
#   - Expose the application container directly
#   - Manage or renew TLS certificates
###############################################################################

###############################################################################
# Application Upstream
###############################################################################

upstream github_readme_stats {

    server github-readme-stats:9000;

    keepalive 32;

}

###############################################################################
# HTTP Server
#
# Responsibilities
#   - Accept HTTP traffic on port 80
#   - Redirect application traffic to HTTPS
###############################################################################

server {

    listen 80;
    listen [::]:80;

    server_name vishal-github-stats.duckdns.org;

    ###########################################################################
    # HTTPS Redirect
    ###########################################################################

    location / {

        return 301 https://$host$request_uri;

    }

}

###############################################################################
# HTTPS Server
#
# Responsibilities
#   - Accept HTTPS traffic on port 443
#   - Terminate TLS
#   - Provide the Nginx health endpoint
#   - Reverse proxy application traffic
###############################################################################

server {

    listen 443 ssl;
    listen [::]:443 ssl;

    server_name vishal-github-stats.duckdns.org;

    ###########################################################################
    # TLS Configuration
    ###########################################################################

    ssl_certificate
        /etc/letsencrypt/live/vishal-github-stats.duckdns.org/fullchain.pem;

    ssl_certificate_key
        /etc/letsencrypt/live/vishal-github-stats.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    ###########################################################################
    # Nginx Health Check
    ###########################################################################

    location = /nginx-health {

        access_log off;

        default_type text/plain;

        return 200 "healthy\n";

    }

    ###########################################################################
    # Application Reverse Proxy
    ###########################################################################

    location / {

        proxy_pass http://github_readme_stats;

        #######################################################################
        # HTTP Protocol
        #######################################################################

        proxy_http_version 1.1;

        #######################################################################
        # Request Headers
        #######################################################################

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        #######################################################################
        # Upstream Connection Handling
        #######################################################################

        proxy_set_header Connection "";

        #######################################################################
        # Proxy Timeouts
        #######################################################################

        proxy_connect_timeout 10s;

        proxy_send_timeout 60s;

        proxy_read_timeout 60s;

    }

}