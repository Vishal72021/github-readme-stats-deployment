###############################################################################
# GitHub Readme Stats Deployment
#
# Application Reverse Proxy Configuration
#
# Responsibilities
#   - Define the GitHub Readme Stats upstream
#   - Accept incoming HTTP requests
#   - Provide an independent Nginx health endpoint
#   - Proxy application traffic to the internal application service
#   - Preserve client and request metadata
#   - Configure proxy connection and response timeouts
#
# This file intentionally does NOT:
#   - Configure global Nginx runtime behavior
#   - Expose the application container directly
#   - Configure TLS certificates
#   - Configure HTTPS
#   - Configure HTTP-to-HTTPS redirects
###############################################################################

###############################################################################
# Application Upstream
###############################################################################

upstream github_readme_stats {

    server github-readme-stats:9000;

    keepalive 32;

}

###############################################################################
# HTTP Server
###############################################################################

server {

    listen 80;

    server_name _;

    ###########################################################################
    # Nginx Health Check
    ###########################################################################

    location = /nginx-health {

        access_log off;

        default_type text/plain;

        return 200 "healthy\n";

    }

    ###########################################################################
    # Application Reverse Proxy
    ###########################################################################

    location / {

        proxy_pass http://github_readme_stats;

        #######################################################################
        # HTTP Protocol
        #######################################################################

        proxy_http_version 1.1;

        #######################################################################
        # Request Headers
        #######################################################################

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        #######################################################################
        # Upstream Connection Handling
        #######################################################################

        proxy_set_header Connection "";

        #######################################################################
        # Proxy Timeouts
        #######################################################################

        proxy_connect_timeout 10s;

        proxy_send_timeout 60s;

        proxy_read_timeout 60s;

    }

}